<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognix AI | Professional Adaptive Assistant</title>
    <link rel="stylesheet" href="style.css?v=3.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <!-- Auth Interface -->
    <div id="auth-view" class="auth-container hidden">
        <div class="auth-card">
            <button id="auth-back-btn">← Back to Chat</button>
            
            <div id="login-form-content">
                <div class="auth-header">
                    <div class="auth-logo">🧠</div>
                    <h2 class="auth-title">Welcome back</h2>
                    <p class="auth-sub">Log in to your Cognix account</p>
                </div>
                <form id="form-signin" class="form-stack">
                    <input type="email" id="login-email" placeholder="Email address" required>
                    <div class="pass-wrapper">
                        <input type="password" id="login-password" placeholder="Password" required>
                        <button type="button" class="eye-toggle">👁️</button>
                    </div>
                    <button type="submit" class="primary-submit">Log in</button>
                    <div class="divider"><span>OR</span></div>
                    <div class="social-grid">
                        <button type="button" class="social-btn g-login">
                            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png"> Continue with Google
                        </button>
                        <button type="button" class="social-btn m-login">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"> Continue with Microsoft
                        </button>
                    </div>
                    <p class="switch-link">Don't have an account? <a href="#" id="to-signup">Sign up</a></p>
                </form>
            </div>

            <div id="signup-form-content" class="hidden">
                 <div class="auth-header">
                    <div class="auth-logo">🧠</div>
                    <h2 class="auth-title">Create account</h2>
                    <p class="auth-sub">Start your journey with Cognix AI</p>
                </div>
                <form id="form-signup" class="form-stack">
                    <input type="text" id="signup-name" placeholder="Full name" required>
                    <input type="email" id="signup-email" placeholder="Email address" required>
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <button type="submit" class="primary-submit">Create account</button>
                    <p class="switch-link">Already have an account? <a href="#" id="to-login">Log in</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="app-view" class="workspace-layout">
        <!-- Sidebar -->
        <aside id="main-sidebar" class="sidebar">
            <div class="sidebar-top">
                <div class="logo-area">Cognix AI</div>
                <button id="new-chat-btn" class="sidebar-action-btn">+ New Chat</button>
            </div>
            <div id="history-container" class="sidebar-scrollable"></div>
            <div class="sidebar-bottom">
                <!-- User UI -->
                <div id="user-profile" class="user-pill glass hidden">
                    <div class="avatar" id="avatar-char">U</div>
                    <div class="details">
                        <div id="user-name-label">Username</div>
                        <div id="user-email-label">email@cognix.ai</div>
                    </div>
                    <button id="settings-trigger" class="icon-btn">⚙️</button>
                </div>
                <!-- Guest UI -->
                <div id="guest-prompt" class="auth-trigger-area">
                    <button id="login-trigger-btn" class="sidebar-action-btn accent">Log In / Sign Up</button>
                </div>
            </div>
        </aside>

        <!-- Main Screen -->
        <main class="chat-viewport">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <button id="sidebar-toggle-btn" class="nav-toggle">☰</button>
                    <span id="title-label">New Conversation</span>
                </div>
                <div class="header-right">
                    <div id="header-auth-tools" class="header-btns">
                        <button id="header-login" class="h-btn">Log In</button>
                        <button id="header-signup" class="h-btn primary">Sign Up</button>
                    </div>
                    <div class="badge-pill">🧠 <span id="mem-count-badge">0</span></div>
                    <div class="online-status">● Online</div>
                </div>
            </header>

            <!-- Chat Area -->
            <div id="messages-list" class="messages-scroll-area">
                <!-- Messages render here -->
            </div>

            <!-- Input Console -->
            <div class="input-panel-container">
                <div class="console-box glass">
                    <textarea id="chat-input-field" placeholder="Message Cognix..." rows="1"></textarea>
                    <div class="console-tools-row">
                        <div class="tools-group">
                            <button id="tool-attach" class="tool-btn" title="Attach">📎</button>
                            <button id="tool-image" class="tool-btn" title="Image">🖼️</button>
                            <button id="tool-screen" class="tool-btn" title="Screen">📹</button>
                            <button id="tool-voice" class="tool-btn" title="Voice">🎤</button>
                            <button id="tool-emoji" class="tool-btn" title="Emoji">😊</button>
                        </div>
                        <div class="actions-group">
                            <button id="send-trigger" class="send-circle" disabled>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals & Pickers -->
    <div id="settings-modal" class="full-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Settings</h3>
                <button id="settings-close" class="close-x">×</button>
            </div>
            <div class="modal-content">
                <button id="delete-chat-trigger" class="danger-btn outline">Delete Chat History</button>
                <button id="logout-trigger" class="danger-btn">Log Out</button>
            </div>
        </div>
    </div>

    <input type="file" id="hidden-file-picker" hidden>
    <input type="file" id="hidden-image-picker" hidden accept="image/*">
    <div id="toast" class="toast-box hidden"></div>

    <script src="app.js?v=3.0"></script>
</body>
</html>
